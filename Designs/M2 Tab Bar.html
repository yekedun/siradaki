<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M2 · Tab Bar</title>
<link rel="stylesheet" href="tokens.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="preview-stage">
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { useState } = React;

const Icon = ({ name, color }) => {
  const stroke = { stroke: color, strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round', fill: 'none' };
  if (name === 'cal') return (<svg width="22" height="22" viewBox="0 0 24 24" {...stroke}><rect x="3.5" y="5" width="17" height="15" rx="2.5"/><path d="M8 3v4M16 3v4M3.5 10h17"/></svg>);
  if (name === 'block') return (<svg width="22" height="22" viewBox="0 0 24 24" {...stroke}><circle cx="12" cy="12" r="8.5"/><path d="M6.5 6.5l11 11"/></svg>);
  if (name === 'gear') return (<svg width="22" height="22" viewBox="0 0 24 24" {...stroke}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.7l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-1.7-.3 1.6 1.6 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.6 1.6 0 0 0-1-1.5 1.6 1.6 0 0 0-1.7.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0 .3-1.7 1.6 1.6 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.6 1.6 0 0 0 1.5-1 1.6 1.6 0 0 0-.3-1.7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.7.3h.1a1.6 1.6 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.6 1.6 0 0 0 1 1.5 1.6 1.6 0 0 0 1.7-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.7v.1a1.6 1.6 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1z"/></svg>);
  return null;
};

function Stub({ title, eyebrow, body }) {
  return (
    <div style={{ padding: '88px 24px 24px' }}>
      <div className="eyebrow" style={{ marginBottom: 6 }}>{eyebrow}</div>
      <h1 style={{ margin: '0 0 8px', fontSize: 30, fontWeight: 700, letterSpacing: -0.5 }}>{title}</h1>
      <div style={{ fontSize: 14, color: 'var(--muted)', lineHeight: 1.5, marginBottom: 24 }}>{body}</div>
      <div style={{
        height: 220, background: 'var(--surface)', borderRadius: 'var(--r-card)',
        border: '1px solid var(--hair)', boxShadow: 'var(--shadow-card)',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: 'var(--mutedAlt)', fontSize: 12, letterSpacing: 1, textTransform: 'uppercase',
      }}>İçerik gelecek</div>
    </div>
  );
}

function App() {
  const [tab, setTab] = useState('cal');

  const tabs = [
    { id: 'cal',   icon: 'cal',   label: 'Randevular' },
    { id: 'block', icon: 'block', label: 'Blok' },
    { id: 'gear',  icon: 'gear',  label: 'Ayarlar' },
  ];

  const screens = {
    cal:   <Stub eyebrow="BERBER · DÜKKAN PANELİ" title="Randevular" body="Bugünün ajandası buraya gelir. Detaylar için M3'e bak." />,
    block: <Stub eyebrow="BLOK EKLE"             title="Slotu Blokla" body="Hızlı blok ekleme — süre + sebep seçimi. Detaylar için M4'e bak." />,
    gear:  <Stub eyebrow="AYARLAR"               title="Ayarlar"      body="Widget tokenları + çıkış. Detaylar için M5'e bak." />,
  };

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <div style={{ flex: 1, overflow: 'auto' }}>{screens[tab]}</div>

      {/* Tab bar */}
      <div style={{
        background: 'var(--bg)',
        borderTop: '1px solid var(--hair)',
        paddingTop: 8, paddingBottom: 28,
        display: 'flex', justifyContent: 'space-around',
      }}>
        {tabs.map(t => {
          const active = t.id === tab;
          const color = active ? 'var(--navy)' : 'var(--muted)';
          return (
            <button key={t.id} onClick={() => setTab(t.id)} style={{
              flex: 1, padding: '6px 8px',
              background: 'transparent', border: 'none', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
              color,
            }}>
              <Icon name={t.icon} color={active ? '#1E3A8A' : '#6B7280'} />
              <div style={{ fontSize: 11, fontWeight: active ? 700 : 500 }}>{t.label}</div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <IOSDevice width={390} height={844}><App /></IOSDevice>
);
</script>
</body>
</html>
