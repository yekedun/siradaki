<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Servis Seç</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function App() {
  const [pick, setPick] = useState(null);
  const services = [
    { id: 'sac',  name: 'Saç Kesimi',      dur: 30, price: 250 },
    { id: 'sakl', name: 'Sakal Tıraşı',    dur: 20, price: 150 },
    { id: 'comb', name: 'Saç + Sakal',     dur: 60, price: 380 },
    { id: 'yik',  name: 'Yıkama & Bakım',  dur: 15, price: 100 },
    { id: 'cocuk',name: 'Çocuk Saç Kesimi',dur: 25, price: 200 },
  ];
  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <NavTopBar title="Yeni Randevu" onBack={() => history.back()} step="1/3"/>
      <Stepper current={1} total={3}/>
      <div style={{ flex: 1, overflow: 'auto', padding: '8px 20px 100px' }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>ADIM 1</div>
        <h1 style={{ margin: '0 0 6px', fontSize: 24, fontWeight: 700, letterSpacing: -0.3 }}>Hangi hizmet?</h1>
        <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 18 }}>İstediğin hizmeti seç. Süre ve fiyat berberden gelir.</div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {services.map(s => {
            const sel = pick === s.id;
            return (
              <button key={s.id} onClick={() => setPick(s.id)} style={{
                padding: 14, textAlign: 'left',
                background: sel ? 'var(--blueSoft)' : 'var(--surface)',
                border: `1.5px solid ${sel ? 'var(--navy)' : 'var(--hair)'}`,
                borderRadius: 'var(--r-card)',
                boxShadow: sel ? 'none' : 'var(--shadow-card)',
                cursor: 'pointer', fontFamily: 'inherit',
                display: 'flex', alignItems: 'center', gap: 12,
              }}>
                <div style={{
                  width: 20, height: 20, borderRadius: 20,
                  border: `2px solid ${sel ? 'var(--navy)' : 'var(--hair)'}`,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                  background: sel ? 'var(--navy)' : 'transparent', flex: '0 0 auto',
                }}>
                  {sel && <div style={{ width: 8, height: 8, borderRadius: 8, background: '#fff' }}/>}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: sel ? 'var(--navy)' : 'var(--ink)' }}>{s.name}</div>
                  <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{s.dur} dakika</div>
                </div>
                <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--ink)', fontVariantNumeric: 'tabular-nums' }}>
                  ₺{s.price}
                </div>
              </button>
            );
          })}
        </div>
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0,
        padding: '14px 20px 24px', background: 'linear-gradient(to top, var(--bg) 70%, rgba(248,250,252,0))' }}>
        <PrimaryCTA disabled={!pick} onClick={() => location.href='C9 Booking Slot.html'}>
          Devam Et
        </PrimaryCTA>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
