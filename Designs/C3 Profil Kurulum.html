<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Profil Kurulum</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function App() {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <NavTopBar title="Profil Kurulum" onBack={() => history.back()} step="3/3"/>
      <div style={{ flex: 1, padding: '24px 24px', overflow: 'auto' }}>
        <Avatar initials={(name[0]||'?').toUpperCase()} size={72}/>
        <h1 style={{ margin: '20px 0 6px', fontSize: 24, fontWeight: 700, letterSpacing: -0.3 }}>Seni nasıl tanıyalım?</h1>
        <div style={{ fontSize: 14, color: 'var(--muted)', marginBottom: 24, lineHeight: 1.5 }}>
          Berberin sana "kim geldi" diye sormaması için iki bilgi.
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          <label><span style={labelStyle}>Ad Soyad</span>
            <input value={name} onChange={e => setName(e.target.value)} placeholder="örn. Ahmet Yılmaz" style={inputStyle}/></label>
          <label><span style={labelStyle}>Email (opsiyonel)</span>
            <input value={email} onChange={e => setEmail(e.target.value)} placeholder="ahmet@mail.com" style={inputStyle}/></label>
        </div>

        <div style={{ marginTop: 22, padding: 12, background: 'var(--blueSoft)',
          borderRadius: 'var(--r-card)', display: 'flex', gap: 10, alignItems: 'flex-start' }}>
          <div style={{ width: 18, height: 18, borderRadius: 18, background: 'var(--navy)',
            color: '#fff', fontSize: 11, fontWeight: 700, display: 'flex',
            alignItems: 'center', justifyContent: 'center', flex: '0 0 auto' }}>i</div>
          <div style={{ fontSize: 12, color: 'var(--ink)', lineHeight: 1.5 }}>
            Bu bilgileri sadece randevu aldığın berber görür. Pazarlama yok.
          </div>
        </div>
      </div>

      <div style={{ padding: 20, paddingBottom: 24 }}>
        <PrimaryCTA disabled={!name.trim()} onClick={() => location.href='C5 Ana Sayfa.html'}>
          Devam Et
        </PrimaryCTA>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
