<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Berber · Randevular</title>
<style>
  html, body { margin: 0; padding: 0; background: #0F172A; min-height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    padding: 24px;
    box-sizing: border-box;
    background:
      radial-gradient(800px 500px at 20% 10%, rgba(37,99,235,0.10), transparent 60%),
      radial-gradient(700px 600px at 90% 90%, rgba(220,38,38,0.10), transparent 60%),
      #0F172A;
  }

  /* Pulse */
  .pulse-dot {
    width: 14px; height: 14px; border-radius: 14px;
    background: #DC2626;
    box-shadow: 0 0 0 0 rgba(220,38,38,0.5);
    animation: pulse 1.6s ease-out infinite;
    z-index: 3;
    position: relative;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0   rgba(220,38,38,0.6); }
    70%  { box-shadow: 0 0 0 12px rgba(220,38,38,0); }
    100% { box-shadow: 0 0 0 0   rgba(220,38,38,0); }
  }

  /* Barber pole — repeating diagonal stripes */
  .barber-pole {
    background-image: repeating-linear-gradient(
      135deg,
      #DC2626 0 6px,
      #FFFFFF 6px 12px,
      #2563EB 12px 18px,
      #FFFFFF 18px 24px
    );
    background-size: 100% auto;
    animation: barber-scroll 6s linear infinite;
  }
  @keyframes barber-scroll {
    from { background-position: 0 0; }
    to   { background-position: 0 -48px; }
  }

  /* Hide horizontal scrollbar on date strip */
  ::-webkit-scrollbar { width: 0; height: 0; }

  button:active { transform: scale(0.985); }
  button { transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <script type="text/babel">
    const Mount = () => (
      <IOSDevice width={390} height={844}>
        <BerberApp />
      </IOSDevice>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<Mount />);
  </script>
</body>
</html>
