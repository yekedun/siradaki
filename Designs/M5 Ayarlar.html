<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M5 · Ayarlar</title>
<link rel="stylesheet" href="tokens.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="preview-stage">
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [tokens, setTokens] = useState([
    { id: 1, label: 'iPhone Widget',   last: '7 May 2026', code: 'wgt_4f9a…b21c' },
    { id: 2, label: 'Eşim Telefonu',   last: '3 May 2026', code: 'wgt_a02e…71d8' },
    { id: 3, label: 'iPad - Kasa',     last: '12 Nis 2026', code: 'wgt_88c1…0fe4' },
  ]);
  const [creating, setCreating] = useState(false);

  const remove = (id) => setTokens(t => t.filter(x => x.id !== id));
  const create = () => {
    setCreating(true);
    setTimeout(() => {
      setTokens(t => [...t, { id: Date.now(), label: 'Yeni Token', last: 'Bugün', code: 'wgt_' + Math.random().toString(36).slice(2, 6) + '…' + Math.random().toString(36).slice(2, 6) }]);
      setCreating(false);
    }, 700);
  };

  return (
    <div style={{
      width: '100%', height: '100%', background: 'var(--bg)',
      display: 'flex', flexDirection: 'column',
    }}>
      <div className="no-scrollbar" style={{ flex: 1, overflow: 'auto', padding: '64px 20px 32px' }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>AYARLAR</div>
        <h1 style={{ margin: '0 0 8px', fontSize: 30, fontWeight: 700, letterSpacing: -0.5 }}>Ayarlar</h1>
        <div style={{ fontSize: 14, color: 'var(--muted)', lineHeight: 1.5 }}>
          Widget tokenlarını yönet ve hesabından çıkış yap.
        </div>

        {/* Account card */}
        <div style={{
          marginTop: 22, padding: 14,
          background: 'var(--surface)', border: '1px solid var(--hair)',
          borderRadius: 'var(--r-card)', boxShadow: 'var(--shadow-card)',
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div style={{
            width: 44, height: 44, borderRadius: 12,
            background: 'linear-gradient(135deg, var(--avatarFrom), var(--avatarTo))',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontWeight: 700, color: 'var(--navy)', fontSize: 16, flex: '0 0 auto',
          }}>BD</div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Berber Dükkan</div>
            <div style={{ fontSize: 12, color: 'var(--muted)' }}>berber@dukkan.com</div>
          </div>
        </div>

        {/* Section: tokens */}
        <div style={{ marginTop: 26, display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{
            fontSize: 11, fontWeight: 600, color: 'var(--muted)',
            textTransform: 'uppercase', letterSpacing: 0.6,
          }}>Widget Tokenları</div>
          <div style={{ fontSize: 11, color: 'var(--mutedAlt)', fontWeight: 500 }}>{tokens.length} adet</div>
        </div>

        <button onClick={create} disabled={creating} style={{
          width: '100%', padding: 14, marginBottom: 12,
          background: 'var(--navy)', color: '#fff', border: 'none',
          borderRadius: 'var(--r-cta)', fontSize: 14, fontWeight: 600, cursor: 'pointer',
          boxShadow: 'var(--shadow-cta)',
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
        }}>
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none">
            <path d="M9 3.5v11M3.5 9h11" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
          </svg>
          {creating ? 'Oluşturuluyor…' : 'Yeni Token Oluştur'}
        </button>

        {tokens.length === 0 ? (
          <div style={{ padding: '40px 20px', textAlign: 'center' }}>
            <div style={{
              width: 64, height: 64, borderRadius: 32,
              background: 'var(--surfaceAlt)', margin: '0 auto 14px',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M14.5 11l-3 3-2-2M7 12.5V7a5 5 0 0 1 10 0v5.5" stroke="#9CA3AF" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                <rect x="4.5" y="11" width="15" height="9" rx="2.5" stroke="#9CA3AF" strokeWidth="1.8"/>
              </svg>
            </div>
            <div style={{ fontSize: 15, fontWeight: 600 }}>Henüz token yok</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 4 }}>Widget'ında randevuları görmek için bir token oluştur.</div>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {tokens.map(t => (
              <div key={t.id} style={{
                padding: 12,
                background: 'var(--surface)', border: '1px solid var(--hair)',
                borderRadius: 'var(--r-card)', boxShadow: 'var(--shadow-card)',
                display: 'flex', alignItems: 'center', gap: 12,
              }}>
                <div style={{
                  width: 36, height: 36, borderRadius: 10,
                  background: 'var(--surfaceAlt)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flex: '0 0 auto',
                }}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M15 9.5a3.5 3.5 0 1 1-4.95 4.95L7 17.5V20h2.5l1-1v-1.5h1.5V16h1.5l1.55-1.55A3.5 3.5 0 0 1 15 9.5z"
                          stroke="#1E3A8A" strokeWidth="1.7" strokeLinejoin="round"/>
                  </svg>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 600 }}>{t.label}</div>
                  <div style={{
                    fontSize: 11, color: 'var(--muted)', marginTop: 2,
                    fontVariantNumeric: 'tabular-nums',
                  }}>
                    <span style={{ fontFamily: 'ui-monospace, Menlo, monospace' }}>{t.code}</span>
                    {' · son ' + t.last}
                  </div>
                </div>
                <button onClick={() => remove(t.id)} style={{
                  flex: '0 0 auto',
                  padding: '8px 10px',
                  background: 'var(--redSoft)', color: 'var(--red)',
                  border: '1px solid var(--redBorder)',
                  borderRadius: 'var(--r-card)',
                  fontSize: 12, fontWeight: 600, cursor: 'pointer',
                }}>Sil</button>
              </div>
            ))}
          </div>
        )}

        {/* Logout */}
        <div style={{ marginTop: 28 }}>
          <button style={{
            width: '100%', padding: 14,
            background: 'var(--redSoft)', color: 'var(--red)',
            border: '1px solid var(--redBorder)',
            borderRadius: 'var(--r-card)',
            fontSize: 14, fontWeight: 600, cursor: 'pointer',
          }}>Çıkış Yap</button>
        </div>

        <div style={{ marginTop: 18, textAlign: 'center', fontSize: 11, color: 'var(--mutedAlt)' }}>
          Berber Panel · v1.0.0
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <IOSDevice width={390} height={844}><App /></IOSDevice>
);
</script>
</body>
</html>
