<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Tab Bar</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function App() {
  const [tab, setTab] = useState('home');
  const tabs = [
    { id: 'home', label: 'Ana sayfa', icon: ICN.home(tab==='home'?'#1E3A8A':'#6B7280') },
    { id: 'cal',  label: 'Randevular',icon: ICN.cal(tab==='cal'?'#1E3A8A':'#6B7280') },
    { id: 'user', label: 'Profil',    icon: ICN.user(tab==='user'?'#1E3A8A':'#6B7280') },
  ];
  const screens = {
    home: { e: 'BERBER', t: 'Ana sayfa', s: "Detay için C5'e bak." },
    cal:  { e: 'RANDEVULARIM', t: 'Randevularım', s: "Detay için C6'ya bak." },
    user: { e: 'PROFİL', t: 'Profil', s: "Detay için C7'ye bak." },
  };
  const c = screens[tab];
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <div style={{ flex: 1, overflow: 'auto' }}>
        <PageHeader eyebrow={c.e} title={c.t} sub={c.s}/>
        <div style={{ padding: '8px 20px' }}>
          <Card style={{ height: 240, display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--mutedAlt)', fontSize: 11, letterSpacing: 1, textTransform: 'uppercase' }}>
            İçerik bağlı ekranda
          </Card>
        </div>
      </div>
      <TabBar tabs={tabs} active={tab} onChange={setTab}/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
