<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 · Berber Bulunamadı</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .card { max-width: 520px; text-align: center; }
  .num {
    font-size: 96px; font-weight: 800; letter-spacing: -3px;

    font-variant-numeric: tabular-nums;
  }
  .pole {
    width: 80px; height: 8px; border-radius: 4px;
    margin: 18px auto 26px;
    background-image: repeating-linear-gradient(135deg, #DC2626 0 6px, #FFFFFF 6px 12px, #2563EB 12px 18px, #FFFFFF 18px 24px);
    background-size: 100% auto;
    animation: barber-scroll 6s linear infinite;
    opacity: 0.55;
  }
  h1 { margin: 0 0 8px; font-size: 30px; font-weight: 700; letter-spacing: -0.5px; color: var(--ink); }
  p { margin: 0 0 24px; font-size: 14px; color: var(--muted); line-height: 1.6; }
  .cta {
    display: inline-block; padding: 14px 22px;
    background: var(--navy); color: #fff;
    border-radius: var(--r-cta);
    font-size: 14px; font-weight: 600; text-decoration: none;
    box-shadow: var(--shadow-cta);
  }
  .meta {
    margin-top: 28px; padding-top: 18px;
    border-top: 1px solid var(--hair);
    font-size: 11px; color: var(--mutedAlt);
    text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600;
  }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow" style="margin-bottom: 8px;">404 · SAYFA YOK</div>

  <div class="meta">Berber · v1.0.0</div>
</div>
