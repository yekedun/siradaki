<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Onay</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function Line({ k, v, bold }) {
  return (
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline',
      padding: '10px 0', borderBottom: '1px solid var(--hair)' }}>
      <div style={{ fontSize: 13, color: 'var(--muted)' }}>{k}</div>
      <div style={{ fontSize: bold ? 16 : 14, fontWeight: bold ? 700 : 600, color: 'var(--ink)',
        fontVariantNumeric: 'tabular-nums' }}>{v}</div>
    </div>
  );
}
function App() {
  const [note, setNote] = useState('');
  const [confirmed, setConfirmed] = useState(false);

  if (confirmed) {
    return (
      <div style={{ width: '100%', height: '100%', background: 'var(--bg)',
        display: 'flex', flexDirection: 'column', padding: 24, boxSizing: 'border-box' }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center', padding: '40px 24px' }}>
          <div style={{
            width: 72, height: 72, borderRadius: 36, background: 'var(--blueSoft)',
            display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 18,
          }}>
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
              <path d="M9 18.5l5.5 5.5L27 11" stroke="#1E3A8A" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>ONAYLANDI</div>
          <h1 style={{ margin: '0 0 8px', fontSize: 26, fontWeight: 700, letterSpacing: -0.3, textAlign: 'center' }}>
            Randevun alındı
          </h1>
          <div style={{ fontSize: 14, color: 'var(--muted)', textAlign: 'center', lineHeight: 1.6, marginBottom: 24, maxWidth: 280 }}>
            <b style={{ color: 'var(--ink)' }}>8 Mayıs 2026, Per</b> günü saat <b style={{ color: 'var(--ink)' }}>14:30</b>'da Mert'in Yeri'nde görüşmek üzere.
          </div>
          <Card style={{ width: '100%', padding: 14, marginBottom: 18 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <Avatar initials="MY" size={44}/>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>Mert'in Yeri</div>
                <div style={{ fontSize: 12, color: 'var(--muted)' }}>Bağdat Cad. 142, Kadıköy</div>
              </div>
            </div>
          </Card>
        </div>
        <div style={{ padding: 4, display: 'flex', flexDirection: 'column', gap: 10 }}>
          <PrimaryCTA onClick={() => location.href='C6 Randevularım.html'}>Randevularıma Git</PrimaryCTA>
          <button onClick={() => location.href='C5 Ana Sayfa.html'} style={{
            width: '100%', padding: 14, background: 'transparent', color: 'var(--navy)',
            border: 'none', fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit',
          }}>Ana sayfaya dön</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <NavTopBar title="Yeni Randevu" onBack={() => history.back()} step="3/3"/>
      <Stepper current={3} total={3}/>
      <div style={{ flex: 1, overflow: 'auto', padding: '8px 20px 100px' }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>ADIM 3</div>
        <h1 style={{ margin: '0 0 14px', fontSize: 24, fontWeight: 700, letterSpacing: -0.3 }}>Onay</h1>

        <Card style={{ padding: 14, marginBottom: 14 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 8 }}>
            <Avatar initials="MY" size={44}/>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 600 }}>Mert'in Yeri</div>
              <div style={{ fontSize: 12, color: 'var(--muted)' }}>Bağdat Cad. 142, Kadıköy</div>
            </div>
          </div>
          <Line k="Servis" v="Saç + Sakal"/>
          <Line k="Süre" v="60 dk"/>
          <Line k="Tarih" v="8 May 2026, Per"/>
          <Line k="Saat" v="14:30"/>
          <Line k="Toplam" v="₺380" bold/>
        </Card>

        <label><span style={labelStyle}>Berbere not (opsiyonel)</span>
          <textarea value={note} onChange={e => setNote(e.target.value)}
            placeholder="örn. Yanlardan kısa, üst doğal."
            rows={3}
            style={{ ...inputStyle, resize: 'none', fontFamily: 'inherit' }}/>
        </label>

        <div style={{ marginTop: 14, padding: 12, background: 'var(--surfaceAlt)',
          borderRadius: 'var(--r-card)', fontSize: 12, color: 'var(--muted)', lineHeight: 1.5 }}>
          Randevuyu onayladığında berbere bilgi gider. <b style={{ color: 'var(--ink)' }}>2 saat kala</b> hatırlatma alırsın.
          Randevudan <b style={{ color: 'var(--ink)' }}>3 saat öncesine kadar</b> iptal edebilirsin.
        </div>
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0,
        padding: '14px 20px 24px', background: 'linear-gradient(to top, var(--bg) 70%, rgba(248,250,252,0))' }}>
        <PrimaryCTA onClick={() => setConfirmed(true)}>Randevuyu Onayla</PrimaryCTA>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
