<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>M4 · Slotu Blokla</title>
<link rel="stylesheet" href="tokens.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="preview-stage">
<div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel">
const { useState } = React;

function Section({ title, children }) {
  return (
    <div style={{ marginTop: 22 }}>
      <div style={{
        fontSize: 11, fontWeight: 600, color: 'var(--muted)',
        textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 10,
      }}>{title}</div>
      {children}
    </div>
  );
}

function App() {
  const [dur, setDur] = useState(30);
  const [reason, setReason] = useState('mola');
  const [confirm, setConfirm] = useState(false);

  const durations = [15, 30, 45, 60, 90, 120];
  const reasons = [
    { id: 'walkin', label: 'Yürüyen Müşteri', meta: 'Şu anda gelen müşteri için' },
    { id: 'mola',   label: 'Mola',            meta: 'Kahve / dinlenme arası' },
    { id: 'kisisel',label: 'Kişisel',         meta: 'Telefon, evrak vs.' },
  ];

  return (
    <div style={{
      width: '100%', height: '100%', background: 'var(--bg)',
      display: 'flex', flexDirection: 'column', position: 'relative',
    }}>
      <div className="no-scrollbar" style={{ flex: 1, overflow: 'auto', padding: '64px 20px 120px' }}>
        <div className="eyebrow" style={{ marginBottom: 6 }}>BLOK EKLE</div>
        <h1 style={{ margin: '0 0 8px', fontSize: 30, fontWeight: 700, letterSpacing: -0.5 }}>Slotu Blokla</h1>
        <div style={{ fontSize: 14, color: 'var(--muted)', lineHeight: 1.5 }}>
          Şu andan itibaren seçtiğin süre boyunca takvim kapalı görünür.
        </div>

        {/* Now badge */}
        <div style={{
          marginTop: 20, padding: '12px 14px',
          background: 'var(--redSoft)', border: '1px solid var(--redBorder)',
          borderRadius: 'var(--r-card)',
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div className="pulse-dot" style={{ flex: '0 0 auto' }} />
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: 'var(--red)', letterSpacing: 0.4 }}>ŞU AN · 13:18</div>
            <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>
              Blok başlangıç saati otomatik atanır.
            </div>
          </div>
        </div>

        <Section title="Süre">
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
            {durations.map(d => {
              const sel = d === dur;
              return (
                <button key={d} onClick={() => setDur(d)} style={{
                  padding: '14px 8px',
                  background: sel ? 'var(--blueSoft)' : 'var(--surface)',
                  border: `1.5px solid ${sel ? 'var(--navy)' : 'var(--hair)'}`,
                  borderRadius: 'var(--r-input)',
                  cursor: 'pointer', textAlign: 'center',
                }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: sel ? 'var(--navy)' : 'var(--ink)' }}>{d}</div>
                  <div style={{ fontSize: 11, color: 'var(--muted)', marginTop: 2 }}>dakika</div>
                </button>
              );
            })}
          </div>
        </Section>

        <Section title="Sebep">
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {reasons.map(r => {
              const sel = r.id === reason;
              return (
                <button key={r.id} onClick={() => setReason(r.id)} style={{
                  padding: '14px',
                  background: sel ? 'var(--blueSoft)' : 'var(--surface)',
                  border: `1.5px solid ${sel ? 'var(--navy)' : 'var(--hair)'}`,
                  borderRadius: 'var(--r-card)',
                  display: 'flex', alignItems: 'center', gap: 12, textAlign: 'left',
                  cursor: 'pointer',
                }}>
                  <div style={{
                    width: 20, height: 20, borderRadius: 20,
                    border: `2px solid ${sel ? 'var(--navy)' : 'var(--hairAlt)'}`,
                    flex: '0 0 auto', position: 'relative',
                  }}>
                    {sel && <div style={{
                      position: 'absolute', inset: 3, borderRadius: 14, background: 'var(--navy)',
                    }} />}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: sel ? 'var(--navy)' : 'var(--ink)' }}>{r.label}</div>
                    <div style={{ fontSize: 12, color: 'var(--muted)', marginTop: 2 }}>{r.meta}</div>
                  </div>
                </button>
              );
            })}
          </div>
        </Section>

        {/* Preview card — looks like the M3 block card */}
        <Section title="Önizleme">
          <div style={{
            padding: 14, background: 'var(--surfaceAlt)',
            border: '1px dashed var(--hairAlt)', borderRadius: 'var(--r-card)',
            textAlign: 'center', fontSize: 12, fontWeight: 700, color: '#64748B',
            textTransform: 'uppercase', letterSpacing: 2,
          }}>
            {reasons.find(r => r.id === reason).label.toUpperCase()} · {dur}dk
          </div>
        </Section>
      </div>

      {/* CTA */}
      <div style={{ position: 'absolute', left: 16, right: 16, bottom: 24 }}>
        <button onClick={() => { setConfirm(true); setTimeout(() => setConfirm(false), 1800); }} style={{
          width: '100%', padding: 16,
          background: 'var(--navy)', color: '#fff',
          border: 'none', borderRadius: 'var(--r-fab)',
          fontSize: 15, fontWeight: 600, cursor: 'pointer',
          boxShadow: 'var(--shadow-cta)',
        }}>Bloğu Ekle</button>
      </div>

      {/* Toast */}
      {confirm && (
        <div style={{
          position: 'absolute', left: 20, right: 20, bottom: 96, zIndex: 10,
          padding: '12px 14px', background: 'var(--ink)', color: '#fff',
          borderRadius: 'var(--r-card)', fontSize: 13, fontWeight: 500,
          boxShadow: '0 12px 24px rgba(0,0,0,0.25)',
          display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <div style={{ width: 18, height: 18, borderRadius: 18, background: 'var(--navy)',
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
              <path d="M2.5 6.2L4.8 8.5L9.5 3.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>
          {dur} dakikalık blok eklendi.
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <IOSDevice width={390} height={844}><App /></IOSDevice>
);
</script>
</body>
</html>
