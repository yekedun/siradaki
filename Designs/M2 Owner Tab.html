<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Owner · Tab Bar</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function App() {
  const [tab, setTab] = useState('dash');
  const tabs = [
    { id: 'dash',  label: 'Özet',     icon: ICN.dash(tab==='dash'?'#1E3A8A':'#6B7280') },
    { id: 'cal',   label: 'Ajanda',   icon: ICN.cal(tab==='cal'?'#1E3A8A':'#6B7280') },
    { id: 'team',  label: 'Ekip',     icon: ICN.team(tab==='team'?'#1E3A8A':'#6B7280') },
    { id: 'gear',  label: 'Ayarlar',  icon: ICN.gear(tab==='gear'?'#1E3A8A':'#6B7280') },
  ];
  const screens = {
    dash:  { e: 'BERBER · OWNER', t: 'Özet',    s: "Günün durumu bir bakışta. Detay için M3'e bak." },
    cal:   { e: 'AJANDA',         t: 'Ajanda',  s: "Gün bazlı randevu akışı. Detay için M4'e bak." },
    team:  { e: 'EKİP',           t: 'Ekip',    s: "Personel ve vardiya yönetimi. Detay için M5'e bak." },
    gear:  { e: 'AYARLAR',        t: 'Ayarlar', s: "Dükkan + token ayarları. Detay için M6'ya bak." },
  };
  const c = screens[tab];
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--bg)' }}>
      <div style={{ flex: 1, overflow: 'auto' }}>
        <PageHeader eyebrow={c.e} title={c.t} sub={c.s} />
        <div style={{ padding: '8px 20px' }}>
          <Card style={{ height: 220, display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: 'var(--mutedAlt)', fontSize: 11, letterSpacing: 1, textTransform: 'uppercase' }}>
            İçerik bağlı ekranda
          </Card>
        </div>
      </div>
      <TabBar tabs={tabs} active={tab} onChange={setTab} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
