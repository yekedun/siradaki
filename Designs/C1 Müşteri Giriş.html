<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Giriş</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
function App() {
  const [phone, setPhone] = useState('');
  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)',
      display: 'flex', flexDirection: 'column', padding: '88px 24px 24px', boxSizing: 'border-box' }}>
      <div style={{
        width: 56, height: 56, borderRadius: 14, background: 'var(--navy)',
        position: 'relative', overflow: 'hidden', marginBottom: 24,
        boxShadow: 'var(--shadow-cta)',
      }}>
        <div style={{ position: 'absolute', inset: 0,
          background: 'repeating-linear-gradient(135deg, transparent 0 8px, rgba(220,38,38,0.85) 8px 12px, transparent 12px 20px)' }}/>
      </div>
      <div className="eyebrow" style={{ marginBottom: 6 }}>BERBER · ONLİNE RANDEVU</div>
      <h1 style={{ margin: '0 0 8px', fontSize: 30, fontWeight: 700, letterSpacing: -0.5 }}>Hoş geldin</h1>
      <div style={{ fontSize: 14, color: 'var(--muted)', marginBottom: 32, lineHeight: 1.5 }}>
        Telefon numaranı gir, sana 4 haneli bir doğrulama kodu yollayalım.
      </div>

      <label style={labelStyle}>Telefon</label>
      <div style={{ display: 'flex', gap: 8, marginBottom: 24 }}>
        <div style={{
          padding: '12px 14px', background: 'var(--bg)',
          border: '1.5px solid var(--hair)', borderRadius: 'var(--r-input)',
          fontSize: 14, fontWeight: 600, color: 'var(--ink)',
          display: 'flex', alignItems: 'center', gap: 6,
        }}>🇹🇷 +90</div>
        <input value={phone} onChange={e => setPhone(e.target.value)}
          placeholder="5xx xxx xx xx" inputMode="tel" style={{ ...inputStyle, flex: 1 }}/>
      </div>

      <PrimaryCTA disabled={phone.length < 10} onClick={() => location.href='C2 Doğrulama.html'}>
        Kod Gönder
      </PrimaryCTA>

      <div style={{ marginTop: 18, fontSize: 12, color: 'var(--muted)', textAlign: 'center', lineHeight: 1.5 }}>
        Devam ederek <a href="#" style={{ color: 'var(--navy)', fontWeight: 600, textDecoration: 'none' }}>Kullanım Şartları</a>
        {' ve '}
        <a href="#" style={{ color: 'var(--navy)', fontWeight: 600, textDecoration: 'none' }}>Gizlilik Politikası</a>'nı kabul edersin.
      </div>

      <div style={{ flex: 1 }}/>
      <div style={{ textAlign: 'center', fontSize: 11, color: 'var(--mutedAlt)',
        letterSpacing: 1.2, fontWeight: 600, textTransform: 'uppercase' }}>Berber · v1.0.0</div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
