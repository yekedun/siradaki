<!doctype html>
<html lang="tr">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Müşteri · Slot Seç</title>
<link rel="stylesheet" href="tokens.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body class="preview-stage"><div id="root"></div>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="app-shell.jsx"></script>
<script type="text/babel">
const DAY_SHORT = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];
function App() {
  const today = new Date(2026, 4, 7);
  const days = Array.from({ length: 14 }, (_, i) => { const d = new Date(today); d.setDate(today.getDate()+i); return d; });
  const [day, setDay] = useState(days[1]);
  const [slot, setSlot] = useState(null);

  const slots = ['09:00','09:30','10:00','10:30','11:00','11:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00','18:30'];
  const disabled = new Set(['09:00','10:30','11:30','15:30','17:30']);

  return (
    <div style={{ width: '100%', height: '100%', background: 'var(--bg)', display: 'flex', flexDirection: 'column' }}>
      <NavTopBar title="Yeni Randevu" onBack={() => history.back()} step="2/3"/>
      <Stepper current={2} total={3}/>
      <div style={{ flex: 1, overflow: 'auto', padding: '8px 0 100px' }}>
        <div style={{ padding: '0 20px' }}>
          <div className="eyebrow" style={{ marginBottom: 6 }}>ADIM 2</div>
          <h1 style={{ margin: '0 0 6px', fontSize: 24, fontWeight: 700, letterSpacing: -0.3 }}>Ne zaman?</h1>
          <div style={{ fontSize: 13, color: 'var(--muted)', marginBottom: 14 }}>
            <span style={{ fontWeight: 600, color: 'var(--ink)' }}>Mert'in Yeri</span> · Saç + Sakal · 60dk
          </div>
        </div>

        {/* Date strip */}
        <div style={{ display: 'flex', gap: 8, padding: '0 20px 4px', overflowX: 'auto' }} className="no-scrollbar">
          {days.map((d, i) => {
            const sel = d.getDate() === day.getDate();
            return (
              <button key={i} onClick={() => setDay(d)} style={{
                flex: '0 0 auto', width: 48, height: 64, borderRadius: 'var(--r-pill)',
                border: `1px solid ${sel ? 'var(--ink)' : 'var(--hair)'}`,
                background: sel ? 'var(--ink)' : 'var(--surface)', color: sel ? '#fff' : 'var(--ink)',
                display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
                cursor: 'pointer', fontFamily: 'inherit',
                boxShadow: sel ? 'var(--shadow-pill)' : 'none',
              }}>
                <div style={{ fontSize: 10, fontWeight: 600, letterSpacing: 0.5,
                  color: sel ? 'rgba(255,255,255,0.7)' : 'var(--muted)', textTransform: 'uppercase' }}>
                  {DAY_SHORT[d.getDay()]}
                </div>
                <div style={{ fontSize: 20, fontWeight: 700, marginTop: 2 }}>{d.getDate()}</div>
              </button>
            );
          })}
        </div>

        <div style={{ padding: '18px 20px 0' }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--muted)',
            textTransform: 'uppercase', letterSpacing: 0.6, marginBottom: 10 }}>Müsait saatler</div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
            {slots.map(s => {
              const dis = disabled.has(s);
              const sel = slot === s;
              return (
                <button key={s} onClick={() => !dis && setSlot(s)} disabled={dis} style={{
                  padding: '14px 8px', borderRadius: 'var(--r-input)',
                  border: `1px solid ${sel ? 'var(--navy)' : 'var(--hair)'}`,
                  background: sel ? 'var(--navy)' : (dis ? 'var(--surfaceAlt)' : 'var(--surface)'),
                  color: sel ? '#fff' : (dis ? 'var(--mutedAlt)' : 'var(--ink)'),
                  textDecoration: dis ? 'line-through' : 'none',
                  fontSize: 14, fontWeight: 600, cursor: dis ? 'not-allowed' : 'pointer',
                  fontVariantNumeric: 'tabular-nums', fontFamily: 'inherit',
                  opacity: dis ? 0.7 : 1,
                }}>{s}</button>
              );
            })}
          </div>
        </div>
      </div>
      <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0,
        padding: '14px 20px 24px', background: 'linear-gradient(to top, var(--bg) 70%, rgba(248,250,252,0))' }}>
        <PrimaryCTA disabled={!slot} onClick={() => location.href='C10 Booking Onay.html'}>
          {slot ? `${slot} ile Devam Et` : 'Saat Seç'}
        </PrimaryCTA>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<IOSDevice width={390} height={844}><App/></IOSDevice>);
</script></body></html>
